<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Navigator Invest</title>
    <link rel="icon" href="assets/navigator-invest-icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="主导航">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 40 40" role="img">
              <circle class="mark-ring" cx="20" cy="20" r="15" />
              <path class="mark-axis" d="M20 7v4M20 29v4M7 20h4M29 20h4" />
              <path class="mark-route" d="M11 26c4.5-6.2 8.2-8.5 12-7.2 2 .7 3.3 .1 5.7-3.8" />
              <path class="mark-arrow" d="M25.7 9.6 31 15l-8.5 2.5 3.2-7.9Z" />
              <circle class="mark-node" cx="11" cy="26" r="2.2" />
              <circle class="mark-node" cx="22.6" cy="18.8" r="2.2" />
            </svg>
          </div>
          <div>
            <p class="eyebrow">Path Harness</p>
            <h1>Navigator Invest</h1>
          </div>
        </div>

        <nav id="nav" class="nav-list"></nav>

        <div class="sidebar-footer">
          <p class="eyebrow">当前版本</p>
          <strong id="app-version">0.1 alpha</strong>
          <span id="version-caption">本地 API + SQLite 数据库已接入。</span>
        </div>
      </aside>

      <main class="workspace">
        <header class="workspace-header">
          <div>
            <p id="page-kicker" class="eyebrow">系统总览</p>
            <h2 id="page-title">横坐标库</h2>
            <p id="page-summary"></p>
          </div>
          <div id="runtime-status" class="status-pill" title="本地后端与 SQLite 数据库状态">0.1 alpha</div>
        </header>

        <section class="framework-band" aria-label="系统框架">
          <div class="framework-node">
            <span>01</span>
            <strong>原始信号</strong>
            <p>发言、截图、行情、事件</p>
          </div>
          <div class="framework-line" aria-hidden="true"></div>
          <div class="framework-node">
            <span>02</span>
            <strong>横纵坐标</strong>
            <p>时间事件与价格结构</p>
          </div>
          <div class="framework-line" aria-hidden="true"></div>
          <div class="framework-node">
            <span>03</span>
            <strong>资金状态</strong>
            <p>吸筹、派发、强平、回补</p>
          </div>
          <div class="framework-line" aria-hidden="true"></div>
          <div class="framework-node">
            <span>04</span>
            <strong>Path 候选</strong>
            <p>可证伪的市场路径</p>
          </div>
          <div class="framework-line" aria-hidden="true"></div>
          <div class="framework-node">
            <span>05</span>
            <strong>人工验证</strong>
            <p>交易员审查后入库</p>
          </div>
        </section>

        <section id="page-content" class="page-content"></section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
